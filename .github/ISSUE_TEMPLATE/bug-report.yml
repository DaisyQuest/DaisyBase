name: Bug report
description: Report a defect with a clear reproduction path.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a precise report.

        Please be concrete. A short, exact report is more useful than a long speculative one.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: State the problem in one or two sentences.
      placeholder: A prepared statement against a remote DaisyBase server returns the wrong parameter metadata for DECIMAL columns.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include the exact error text if there is one.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Give the smallest sequence that reproduces the problem.
      placeholder: |
        1. Start the server with ...
        2. Connect with ...
        3. Execute ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Java version, DaisyBase version or commit, and whether the issue is embedded, server, installer, demo app, ORM, or JDBC related.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, stack traces, or screenshots
      description: Paste text when possible. Screenshots are fine when layout matters.
  - type: checkboxes
    id: checks
    attributes:
      label: Final checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I included the exact command, SQL, URL, or configuration involved when relevant.
          required: true
