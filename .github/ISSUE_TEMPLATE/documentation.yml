name: Documentation improvement
description: Report a documentation gap, ambiguity, or error.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Documentation issues matter.

        The most helpful reports say exactly where a reader got lost and what was missing or misleading.
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Link the page or give the repo path.
      placeholder: docs/reference/jdbc-surface.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or unclear?
      description: Be specific about the wording, structure, or omission that caused trouble.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Suggested improvement
      description: If you know what would have helped, describe it.
  - type: checkboxes
    id: checks
    attributes:
      label: Final checks
      options:
        - label: I checked the current handbook and top-level README first.
          required: true
